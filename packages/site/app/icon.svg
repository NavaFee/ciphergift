<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- ink ground tile, rounded -->
  <rect width="100" height="100" rx="22" fill="#0E0F12"/>
  <!-- box (paper) -->
  <rect x="18" y="30" width="64" height="46" rx="3" fill="#F4EFE6"/>
  <!-- vertical ribbon -->
  <rect x="46" y="30" width="8" height="46" fill="#FFD200"/>
  <!-- horizontal ribbon -->
  <rect x="18" y="48" width="64" height="8" fill="#FFD200"/>
  <!-- bow loops -->
  <path d="M50 30 C 36 18, 30 26, 38 34 L 50 34 Z" fill="#FFD200"/>
  <path d="M50 30 C 64 18, 70 26, 62 34 L 50 34 Z" fill="#FFD200"/>
  <!-- knot (ink shows through) -->
  <rect x="46" y="28" width="8" height="6" rx="1" fill="#0E0F12"/>
  <!-- key teeth along the horizontal ribbon -->
  <rect x="14" y="50" width="4" height="4" fill="#F4EFE6"/>
  <rect x="10" y="50" width="4" height="4" fill="#F4EFE6"/>
  <rect x="82" y="50" width="4" height="4" fill="#F4EFE6"/>
  <rect x="86" y="50" width="4" height="4" fill="#F4EFE6"/>
</svg>
